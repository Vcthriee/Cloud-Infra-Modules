name: Terraform Deploy
on:
  push:
    branches:
      - main
      - dev
permissions:
  id-token: write
  contents: read
jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: envs/dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::904690835870:role/GithubActionsOIDCROLE
          aws-region: af-south-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate

      # CHANGED — removed -var-file, added env block with secrets
      - name: Terraform Plan
        env:
          TF_VAR_project_name: ${{ secrets.TF_VAR_project_name }}
          TF_VAR_aws_account_id: ${{ secrets.TF_VAR_aws_account_id }}
          TF_VAR_aws_region: ${{ secrets.TF_VAR_aws_region }}
          TF_VAR_vpc_cidr: ${{ secrets.TF_VAR_vpc_cidr }}
          TF_VAR_db_password: ${{ secrets.TF_VAR_db_password }}
          TF_VAR_availability_zones: ${{ secrets.TF_VAR_availability_zones }}
          TF_VAR_public_subnet_cidrs: ${{ secrets.TF_VAR_public_subnet_cidrs }}
          TF_VAR_private_app_cidrs: ${{ secrets.TF_VAR_private_app_cidrs }}
          TF_VAR_private_data_cidrs: ${{ secrets.TF_VAR_private_data_cidrs }}
        run: terraform plan -out=tfplan

      # CHANGED — added same env block, apply command unchanged
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        env:
          TF_VAR_project_name: ${{ secrets.TF_VAR_project_name }}
          TF_VAR_aws_account_id: ${{ secrets.TF_VAR_aws_account_id }}
          TF_VAR_aws_region: ${{ secrets.TF_VAR_aws_region }}
          TF_VAR_vpc_cidr: ${{ secrets.TF_VAR_vpc_cidr }}
          TF_VAR_db_password: ${{ secrets.TF_VAR_db_password }}
          TF_VAR_availability_zones: ${{ secrets.TF_VAR_availability_zones }}
          TF_VAR_public_subnet_cidrs: ${{ secrets.TF_VAR_public_subnet_cidrs }}
          TF_VAR_private_app_cidrs: ${{ secrets.TF_VAR_private_app_cidrs }}
          TF_VAR_private_data_cidrs: ${{ secrets.TF_VAR_private_data_cidrs }}
        run: terraform apply -auto-approve tfplan