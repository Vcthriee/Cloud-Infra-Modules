name: Terraform Deploy

on:
  push:
    branches:
      - main
      - dev

# Permissions needed for OIDC authentication with AWS
permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest

    # All terraform commands run from the dev environment folder
    defaults:
      run:
        working-directory: envs/dev

    steps:
      # Step 1: Check out the repository code
      - name: Checkout
        uses: actions/checkout@v4

      # Step 2: Authenticate to AWS using OIDC (no static credentials needed)
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::904690835870:role/GithubActionsOIDCROLE
          aws-region: af-south-1

      # Step 3: Install the specified version of Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0

      # Step 4: Initialize Terraform — downloads providers and sets up backend
      - name: Terraform Init
        run: terraform init

      # Step 5: Check all .tf files are correctly formatted
      # Fails if any file needs formatting — run 'terraform fmt' locally to fix
      - name: Terraform Format Check
        run: terraform fmt -check

      # Step 6: Validate the Terraform configuration is syntactically correct
      - name: Terraform Validate
        run: terraform validate

      # Step 7: Generate tfvars file at runtime on the runner
      # None of these values are sensitive so they are safe to hardcode here
      # The tfvars file is never pushed to GitHub — created and destroyed on the runner
      - name: Create tfvars file
        run: |
          cat > terraform.auto.tfvars << 'EOF'
          project_name        = "infra-modules"
          aws_account_id      = "904690835870"
          aws_region          = "af-south-1"
          vpc_cidr            = "10.0.0.0/16"
          availability_zones  = ["af-south-1a", "af-south-1b"]
          public_subnet_cidrs = ["10.0.1.0/24", "10.0.2.0/24"]
          private_app_cidrs   = ["10.0.3.0/24", "10.0.4.0/24"]
          private_data_cidrs  = ["10.0.5.0/24", "10.0.6.0/24"]
          EOF

      # Step 8: Generate an execution plan and save it to tfplan
      # Runs on both dev and main — safe, no changes are made to infrastructure
      - name: Terraform Plan
        run: terraform plan -var-file="terraform.auto.tfvars" -out=tfplan

      # Step 9: Apply the saved plan — only runs on main branch
      # This is the only step that makes real changes to your AWS infrastructure
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve tfplan